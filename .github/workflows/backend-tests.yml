name: backend-tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: Backend/CarGalleryAPI

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 6
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "6.0.x"
          cache: true
          cache-dependency-path: |
            Backend/CarGalleryAPI/CarGalleryAPI.sln
            Backend/CarGalleryAPI/CarGalleryAPI/CarGalleryAPI.csproj
            Backend/CarGalleryAPI/CarGalleryAPI.Tests/CarGalleryAPI.Tests.csproj

      - name: Restore
        run: dotnet restore CarGalleryAPI.sln

      - name: Build
        run: dotnet build CarGalleryAPI.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test CarGalleryAPI.Tests/CarGalleryAPI.Tests.csproj --configuration Release --no-build --verbosity normal
